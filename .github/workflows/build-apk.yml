name: Build APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g @bubblewrap/cli
          
      - name: Initialize Bubblewrap
        run: |
          bubblewrap init --manifest https://jack-pureq.github.io/mis-gastos/manifest.json
        
      - name: Build APK
        run: |
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: GT-PUREQ-APK
          path: '*.apk'
